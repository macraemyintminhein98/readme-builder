<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Readme Builder</title>
    <meta name="description" content="Generate professional README.md files for your GitHub projects instantly.">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center">
        <h1 class="text-4xl font-bold mb-4 text-gray-800">📝 Readme Builder</h1>
        <p class="text-gray-600 mb-6">Craft the perfect README.md for your GitHub project.</p>
        <form action="/api/generate-readme" method="POST">
            <input type="text" name="projectName" placeholder="Project Name" class="w-full p-3 mb-4 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            <textarea name="description" placeholder="A short description of your project" rows="3" class="w-full p-3 mb-4 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
            <button type="submit" class="bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 text-lg">
                Generate README - $9.99
            </button>
        </form>
        <p class="mt-6 text-sm text-gray-500">More options coming soon!</p>
    </div>
</body>
</html>
